; Dev-tuned OPcache — compiled PHP stays in memory instead of being re-read
; from the (slow) Windows bind mount on every request. Timestamps are still
; validated (at most every 2s), so code edits show up without a restart.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Cache resolved file paths — path lookups are the other big cost on a mounted
; filesystem (Laravel resolves thousands per request).
realpath_cache_size=4096K
realpath_cache_ttl=600
