name: Bug Report
description: Something in the app isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please don't use this
        form for security vulnerabilities — see [SECURITY.md](../../SECURITY.md)
        instead.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module is affected (Payment, Attendance, Language, etc.)?
      placeholder: e.g. Payment
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any output from `storage/logs/laravel.log` or `php artisan test`.
      render: shell
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Docker / local, PHP version, browser (if UI-related)
      placeholder: e.g. Docker Compose, PHP 8.3, Chrome 128
    validations:
      required: false
