services:
    db:
        image: mysql:8.0
        container_name: school_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: school_management_v2
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_USER: school_user
            MYSQL_PASSWORD: school_pass
        ports:
            - "3306:3306" # connect from TablePlus / DBeaver on Windows
        volumes:
            - db_data:/var/lib/mysql

    redis:
        image: redis:7-alpine
        container_name: school_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    app:
        build:
            context: .
            command: sh -c "php artisan storage:link && php-fman"
            dockerfile: Dockerfile
        container_name: school_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www # your code is mounted live — edits appear instantly
        depends_on:
            - db
            - redis

    nginx:
        image: nginx:alpine
        container_name: school_nginx
        restart: unless-stopped
        ports:
            - "8080:80" # visit http://localhost:8080 in your browser
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    horizon:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: school_horizon
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan horizon
        volumes:
            - ./:/var/www
        depends_on:
            - db
            - redis

    minio:
        image: minio/minio
        container_name: school_minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # S3 API (Laravel connects as http://minio:9000)
            - "9001:9001" # MinIO Console UI (restrict in production)
        environment:
            MINIO_ROOT_USER: your_access_key
            MINIO_ROOT_PASSWORD: your_secret_key_min_8_chars
        volumes:
            - minio_data:/data

volumes:
    db_data:
    redis_data:
    minio_data: # all uploaded files persist here

