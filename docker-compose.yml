services:
    db:
        image: mysql:8.0
        container_name: school_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: school_management_v2
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_USER: school_user
            MYSQL_PASSWORD: school_pass
        ports:
            - "3306:3306" # connect from TablePlus / DBeaver on Windows
        volumes:
            - db_data:/var/lib/mysql

    redis:
        image: redis:7-alpine
        container_name: school_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    app:
        build:
            context: .
            dockerfile: Dockerfile
        command: sh -c "php artisan storage:link && php-fpm"
        container_name: school_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www # code here
            # vendor lives in a named volume (inside the Linux VM) instead of the
            # slow Windows bind mount — seeded from the image on first start.
            # After changing composer.json: docker compose exec app composer install
            - vendor:/var/www/vendor
        depends_on:
            - db
            - redis

    nginx:
        image: nginx:alpine
        container_name: school_nginx
        restart: unless-stopped
        ports:
            - "8080:80" # site url http://localhost:8080
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    horizon:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: school_horizon
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan horizon
        volumes:
            - ./:/var/www
            - vendor:/var/www/vendor # same vendor volume as app
        depends_on:
            - db
            - redis

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: school_scheduler
        restart: unless-stopped
        working_dir: /var/www
        # `schedule:work` runs a single long-lived worker that fires due tasks
        # at their configured cadence — no host cron needed. Scheduled tasks
        # (attendance:auto-close, etc.) are declared in routes/console.php.
        command: php artisan schedule:work
        volumes:
            - ./:/var/www
            - vendor:/var/www/vendor
        depends_on:
            - db
            - redis

    minio:
        image: minio/minio
        container_name: school_minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # S3 API (Laravel connects as http://minio:9000)
            - "9001:9001" # MinIO Console UI (restrict in production)
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        volumes:
            - minio_data:/data

    # One-shot: creates the AWS_BUCKET bucket (default "school-files", see
    # .env's AWS_BUCKET) the first time the stack comes up, then exits.
    # MinIO starts with ZERO buckets — nothing else creates one, and every
    # Storage::disk('minio') upload in the app fails with "NoSuchBucket"
    # until this runs at least once. The bucket stays PRIVATE (no public
    # policy is set here on purpose): files are served either via
    # Storage::disk('minio')->temporaryUrl() (existing pattern, e.g.
    # certificates/ID cards) or through a Laravel proxy route for anything
    # that needs to be publicly viewable (e.g. Website media) — never by
    # exposing the bucket directly, so this step never has to be re-run or
    # kept in sync with which paths should be public.
    # The script retries the alias step itself (plain image/minio doesn't
    # reliably support a "mc ready" healthcheck across versions, so this
    # doesn't depend on one) until the MinIO API answers, instead of relying
    # on container start order alone.
    # MINIO_ROOT_USER/PASSWORD and the bucket name below must match .env's
    # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_BUCKET — same "kept in
    # sync manually" trade-off already used for the minio service above.
    minio-init:
        image: minio/mc
        container_name: school_minio_init
        depends_on:
            - minio
        entrypoint: >
            /bin/sh -c "
            until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio...'; sleep 2; done &&
            mc mb --ignore-existing local/school-files
            "
        restart: "no"

volumes:
    db_data:
    redis_data:
    minio_data: # all uploaded files
    vendor: # composer deps inside the Linux VM (perf: avoids the Windows mount)
